<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="icon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PolyABC - Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 20px 24px; }
    .logo { height: 70px; margin-bottom: 8px; }
    .welcome-title { font-size: 1.3rem; font-weight: 900; color: white; text-align: center; margin-bottom: 12px; }
    .card { background: #16213e; border-radius: 20px; padding: 20px; width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
    .greeting-btn { padding: 14px; border-radius: 12px; border: none; font-family: Nunito, sans-serif; font-size: 1rem; font-weight: 900; cursor: pointer; transition: transform 0.15s, background 0.2s, opacity 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .greeting-btn:hover:not(:disabled) { transform: scale(1.02); }
    .btn-enter { background: #1a73e8; color: white; }
    .btn-enter:disabled { background: #334; color: #667; cursor: not-allowed; opacity: 0.5; }
    .btn-enter:not(:disabled):hover { background: #1558b0; }
    .btn-speed { background: #00897b; color: white; }
    .btn-speed:hover { background: #00695c; }
    .btn-schedule { background: #0f3460; color: #a0c4ff; border: 2px solid #1a73e8; }
    .btn-schedule:hover { background: #1a3a6e; }
    .btn-exit { background: transparent; color: #667; border: 2px solid #334; }
    .btn-exit:hover { border-color: #e53935; color: #e53935; }

    /* Network test modal */
    #net-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; flex-shrink: 0; }
    #net-box { background: #16213e; border-radius: 24px; padding: 28px 24px; width: 90%; max-width: 340px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
    #net-title { font-size: 1rem; font-weight: 900; color: #a0c4ff; margin-bottom: 20px; }
    #net-verdict { display: none; font-size: 2.5rem; margin-bottom: 6px; }
    #net-verdict-label { display: none; font-size: 1rem; font-weight: 900; margin-bottom: 20px; }
    .net-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .net-card { background: #0f3460; border-radius: 12px; padding: 12px 6px; }
    .net-val { font-size: 1.4rem; font-weight: 900; color: white; }
    .net-unit { font-size: 0.65rem; color: #a0c4ff; font-weight: 700; margin-top: 2px; }
    .net-lbl { font-size: 0.7rem; color: #667; margin-top: 3px; }
    #net-enter-btn { display: none; width: 100%; padding: 14px; border-radius: 12px; border: none; background: #1a73e8; color: white; font-family: Nunito; font-size: 1rem; font-weight: 900; cursor: pointer; margin-bottom: 10px; }
    #net-enter-btn:hover { background: #1558b0; }
    .net-close-btn { width: 100%; padding: 10px; border-radius: 12px; border: none; background: #0f3460; color: #a0c4ff; font-family: Nunito; font-size: 0.9rem; font-weight: 700; cursor: pointer; }

    /* Schedule modal */
    #sched-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
    #sched-box { background: #16213e; border-radius: 24px; padding: 24px; width: 100%; max-width: 380px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
    .sched-item { background: #0f3460; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
    .sched-day { font-size: 0.8rem; color: #a0c4ff; font-weight: 700; margin-bottom: 4px; }
    .sched-time { font-size: 1.1rem; font-weight: 900; color: white; }
    .sched-gdl { font-size: 0.75rem; color: #556; margin-top: 2px; }
    .sched-type { font-size: 0.78rem; color: #ffd740; font-weight: 700; margin-top: 4px; }
    .sched-soon { font-size: 0.72rem; font-weight: 900; margin-top: 4px; }
  </style>
</head>
<body>

<a href="index.html"><img src="LOGO.png" class="logo" alt="PolyABC" style="cursor:pointer;"/></a>
<div class="welcome-title">Welcome, <span id="student-name">Student</span>! 👋</div>

<div class="card">
  <button class="greeting-btn btn-enter" id="enter-btn" onclick="enterClass()" disabled>🎓 Enter Class</button>
  <button class="greeting-btn btn-speed" id="speed-btn" onclick="openNetTest()">📶 Run Speed Test</button>
  <button class="greeting-btn btn-schedule" onclick="openSchedule()">📅 My Schedule</button>
  <button class="greeting-btn btn-exit" onclick="exitToLogin()">🚪 Exit</button>
</div>

<!-- Network Test Modal -->
<div id="net-modal">
  <div id="net-box">
    <div id="net-title">📡 Ready to test your connection</div>
    <div id="net-verdict"></div>
    <div id="net-verdict-label"></div>
    <div class="net-grid">
      <div class="net-card"><div class="net-val" id="m-ping">—</div><div class="net-unit">ms</div><div class="net-lbl">Ping</div></div>
      <div class="net-card"><div class="net-val" id="m-jitter">—</div><div class="net-unit">ms</div><div class="net-lbl">Jitter</div></div>
      <div class="net-card"><div class="net-val" id="m-loss">—</div><div class="net-unit">%</div><div class="net-lbl">Packet Loss</div></div>
    </div>
    <button id="net-enter-btn" onclick="proceedToClass()">🎓 Enter Class</button>
    <button class="net-close-btn" onclick="document.getElementById('net-modal').style.display='none'">Close</button>
  </div>
</div>

<!-- Schedule Modal -->
<div id="sched-modal">
  <div id="sched-box">
    <div style="font-size:1.1rem;font-weight:900;color:white;margin-bottom:16px;">📅 My Schedule</div>
    <div id="sched-list"><div style="color:#667;text-align:center;">Loading...</div></div>
    <button class="net-close-btn" style="margin-top:12px;" onclick="document.getElementById('sched-modal').style.display='none'">Close</button>
  </div>
</div>

<script>
  const SERVER_URL = "https://polyabc-server.onrender.com";

  if (/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)) {
    document.addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
    }, { once: true });
  }

  const token = localStorage.getItem('studentToken');
  const room  = localStorage.getItem('studentRoom');
  const name  = localStorage.getItem('studentName');
  if (!token || !room) window.location.href = 'index.html';
  document.getElementById('student-name').textContent = name || 'Student';

  let _sessionId = null;
  let _netResult = null;

  function nowGDLMins() {
    const s = new Date().toLocaleString('en-US', { timeZone: 'America/Mexico_City', hour: '2-digit', minute: '2-digit', hour12: false });
    const [h, m] = s.split(':').map(Number);
    return h * 60 + m;
  }

  async function getActiveSessionId() {
    try {
      const res = await fetch(`${SERVER_URL}/assignments?room=${room}`, { headers: { Authorization: `Bearer ${token}` } });
      const assignments = await res.json();
      if (!assignments.length) return null;
      const today = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Mexico_City' });
      const todayA = assignments.filter(a => a.date === today);
      if (!todayA.length) return null;
      const nowMins = nowGDLMins();
      let best = null, bestDiff = Infinity;
      for (const a of todayA) {
        const [hh, mm] = a.time.split(':').map(Number);
        const diff = Math.abs(nowMins - (hh * 60 + mm));
        if (diff < bestDiff && diff <= 90) { bestDiff = diff; best = a; }
      }
      return best?.sessionId || null;
    } catch(e) { return null; }
  }

  async function init() {
    _sessionId = await getActiveSessionId();
    const cached = _sessionId && localStorage.getItem(`nettest_${_sessionId}`);
    if (cached) { _netResult = JSON.parse(cached); unlockEnterBtn(_netResult); }
  }
  init();

  function unlockEnterBtn(result) {
    document.getElementById('enter-btn').disabled = false;
    const emoji = result.quality === 'good' ? '🟢' : result.quality === 'fair' ? '🟡' : '🔴';
    const btn = document.getElementById('speed-btn');
    btn.textContent = `${emoji} ${result.avgPing}ms ping · ${result.jitter}ms jitter · ${result.packetLoss}% loss`;
    btn.style.background = result.quality === 'good' ? '#1b5e20' : result.quality === 'fair' ? '#f57f17' : '#b71c1c';
    btn.onclick = openNetTest;
  }

  function openNetTest() {
    document.getElementById('net-modal').style.display = 'flex';
    runNetTest();
  }

  async function runNetTest() {
    document.getElementById('net-title').textContent = '📡 Testing your connection...';
    document.getElementById('net-verdict').style.display = 'none';
    document.getElementById('net-verdict-label').style.display = 'none';
    document.getElementById('net-enter-btn').style.display = 'none';
    ['m-ping','m-jitter','m-loss'].forEach(id => document.getElementById(id).textContent = '—');

    const times = []; let failed = 0; const total = 50;
    for (let i = 0; i < total; i++) {
      try {
        const s = performance.now();
        await fetch(`https://1.1.1.1/cdn-cgi/trace?_=${Date.now()}_${i}`, { cache: 'no-store', mode: 'no-cors' });
        times.push(performance.now() - s);
      } catch(e) { failed++; }
      if (times.length && i % 10 === 9) {
        document.getElementById('m-ping').textContent = Math.round(times.reduce((a,b)=>a+b,0)/times.length);
        document.getElementById('net-title').textContent = `📡 Testing... ${Math.round((i+1)/total*100)}%`;
      }
    }

    const avgPing    = times.length ? Math.round(times.reduce((a,b)=>a+b,0)/times.length) : 9999;
    const mean = avgPing; const jitter = times.length > 1 ? Math.round(Math.sqrt(times.reduce((s,t)=>s+(t-mean)**2,0)/times.length)) : 0;
    const packetLoss = Math.round((failed / total) * 100);

    document.getElementById('m-ping').textContent   = avgPing >= 9999 ? '∞' : avgPing;
    document.getElementById('m-jitter').textContent = jitter;
    document.getElementById('m-loss').textContent   = packetLoss;

    let quality, emoji, label, color;
    if (avgPing < 150 && jitter < 80 && packetLoss === 0) {
      quality = 'good'; emoji = '🟢'; label = 'Great Connection'; color = '#00c853';
    } else if (avgPing < 300 && jitter < 200 && packetLoss <= 10) {
      quality = 'fair'; emoji = '🟡'; label = 'Fair Connection — You may experience minor audio or video issues during class.'; color = '#ffd740';
    } else {
      quality = 'poor'; emoji = '🔴'; label = 'Poor Connection — You may experience significant issues during class. Please check your internet.'; color = '#e53935';
    }

    document.getElementById('net-verdict').textContent = emoji;
    document.getElementById('net-verdict').style.display = 'block';
    const lbl = document.getElementById('net-verdict-label');
    lbl.textContent = label; lbl.style.color = color;
    lbl.style.fontSize = quality === 'good' ? '1.1rem' : '0.88rem';
    lbl.style.display = 'block';
    document.getElementById('net-title').textContent = '✅ Test complete';
    document.getElementById('net-enter-btn').style.display = 'block';

    const result = { avgPing, jitter, packetLoss, quality, testedAt: new Date().toISOString() };
    _netResult = result;
    if (_sessionId) {
      localStorage.setItem(`nettest_${_sessionId}`, JSON.stringify(result));
      fetch(`${SERVER_URL}/attendance/network-test/student`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ sessionId: _sessionId, networkTest: result, studentName: name })
      }).catch(() => {});
    }
    unlockEnterBtn(result);
  }

  async function openSchedule() {
    document.getElementById('sched-modal').style.display = 'flex';
    const list = document.getElementById('sched-list');
    try {
      const res = await fetch(`${SERVER_URL}/assignments?room=${room}`, { headers: { Authorization: `Bearer ${token}` } });
      const assignments = await res.json();
      const today = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Mexico_City' });
      const sorted = assignments.filter(a => a.date >= today).sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));
      if (!sorted.length) { list.innerHTML = '<div style="color:#667;text-align:center;">No upcoming classes.</div>'; return; }

      const now = new Date();
      list.innerHTML = sorted.map(a => {
        const [hh, mm] = a.time.split(':').map(Number);
        // Convert GDL time to local browser time
        const gdlDate = new Date(`${a.date}T${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:00`);
        const gdlOffset = new Date(gdlDate.toLocaleString('en-US', { timeZone: 'America/Mexico_City' })) - gdlDate;
        const localOffset = new Date(gdlDate.toLocaleString('en-US')) - gdlDate;
        const localTime = new Date(gdlDate.getTime() - gdlOffset + localOffset);
        const localStr = localTime.toLocaleString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        const gdlStr = `${hh % 12 || 12}:${String(mm).padStart(2,'0')} ${hh >= 12 ? 'PM' : 'AM'} GDL`;
        const dayName = new Date(a.date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
        const diffMins = Math.round((localTime - now) / 60000);
        let soonTag = '';
        if (diffMins > 0 && diffMins <= 90) soonTag = `<div class="sched-soon" style="color:#00e676;">⚡ In ${diffMins < 60 ? diffMins + ' min' : Math.floor(diffMins/60)+'h '+(diffMins%60?diffMins%60+'min':'')}</div>`;
        else if (diffMins <= 0 && diffMins > -90) soonTag = `<div class="sched-soon" style="color:#ffd740;">🔴 Happening now!</div>`;
        return `<div class="sched-item">
          <div class="sched-day">📅 ${dayName}</div>
          <div class="sched-time">${localStr} <span style="font-size:0.75rem;color:#667;">your time</span></div>
          <div class="sched-gdl">${gdlStr}</div>
          <div class="sched-type">⏱ ${a.classType || ''}${a.groupName ? ' · ' + a.groupName : ''}</div>
          ${soonTag}
        </div>`;
      }).join('');
    } catch(e) { list.innerHTML = '<div style="color:#e53935;">Could not load schedule.</div>'; }
  }

  function proceedToClass() {
    window.location.href = _sessionId ? `classroom.html?room=${room}&sessionId=${_sessionId}` : `classroom.html?room=${room}`;
  }

  function enterClass() { proceedToClass(); }
  function exitToLogin() {
    ['studentToken','studentName','studentRoom'].forEach(k => localStorage.removeItem(k));
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
