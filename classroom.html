<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="LOGO.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    @media screen and (orientation: portrait) and (max-width: 1200px) {
      #rotate-msg {
        display: flex !important;
      }
    }
  </style>
  <title>PolyABC Classroom</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #1a1a2e; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    #topbar { background: #16213e; padding: 6px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #0f3460; flex-shrink: 0; gap: 16px; position: relative; }
    #topbar img { height: 40px; }
    #room-label { font-size: 1rem; font-weight: 700; color: #ffffff; position: absolute; left: 50%; transform: translateX(-50%); background: #0f3460; padding: 4px 16px; border-radius: 20px; white-space: nowrap; }
    #status-bar { font-size: 0.8rem; color: #a0c4ff; background: #0f3460; padding: 4px 10px; border-radius: 8px; } @media (max-width:900px) { #status-bar { display: none; } }
    #leave-btn { background: #e53935; color: white; border: none; padding: 8px 18px; border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; }
    #leave-btn:hover { background: #c62828; }

    #main { display: flex; flex: 1; overflow: hidden; }

    #left-panel { width: 220px; flex-shrink: 0; background: #16213e; display: flex; flex-direction: column; padding: 12px; gap: 10px; border-right: 2px solid #0f3460; }
    .video-box { position: relative; background: #0f3460; border-radius: 12px; overflow: hidden; aspect-ratio: 4/3; }
    .video-box video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .video-label { position: absolute; bottom: 6px; left: 8px; font-size: 0.8rem; font-weight: 700; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 6px; z-index: 3; }
    .teacher-border { border: 3px solid #1a73e8; }
    .mute-overlay { position: absolute; top: 6px; right: 6px; background: rgba(229,57,53,0.85); border-radius: 50%; width: 26px; height: 26px; display: none; align-items: center; justify-content: center; font-size: 0.8rem; }
    #my-controls { display: flex; gap: 8px; }
    .ctrl-btn { flex: 1; padding: 10px 4px; border-radius: 10px; border: none; font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer; background: #0f3460; color: white; transition: background 0.2s; }
    .ctrl-btn:hover { background: #1a73e8; }
    .ctrl-btn.active { background: #e53935; }

    #center-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    #whiteboard-wrap { flex: 1; position: relative; overflow: hidden; background: #ffffff; min-height: 0; }
    #whiteboard-canvas { display: block; }

    #toolbar { background: #16213e; border-top: 2px solid #0f3460; padding: 8px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
    .tool-btn { background: #0f3460; color: white; border: none; padding: 8px 14px; border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .tool-btn:hover { background: #1a73e8; }
    .tool-btn.selected { background: #1a73e8; outline: 2px solid #a0c4ff; }
    #color-picker { width: 36px; height: 36px; border-radius: 8px; border: 3px solid #0f3460; cursor: pointer; padding: 0; }
    #brush-size { width: 90px; accent-color: #1a73e8; }
    .tool-separator { width: 2px; height: 30px; background: #0f3460; border-radius: 2px; }
    #teacher-only { display: none; gap: 8px; }

    #right-panel { width: 180px; flex-shrink: 0; background: #16213e; display: flex; flex-direction: column; padding: 12px; gap: 10px; border-left: 2px solid #0f3460; overflow-y: auto; }
    #right-panel-title { font-size: 0.85rem; font-weight: 700; color: #a0c4ff; text-align: center; }
    .student-box { position: relative; background: #0f3460; border-radius: 10px; overflow: hidden; aspect-ratio: 4/3; width: 100%; }
    .student-box video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .student-box img { width: 100%; height: 100%; object-fit: cover; display: block; position: absolute; top: 0; left: 0; }
    .student-label { position: absolute; bottom: 4px; left: 6px; font-size: 0.75rem; font-weight: 700; background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 5px; z-index: 2; }
    .mute-student-btn { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.5); border: none; color: white; font-size: 0.75rem; border-radius: 6px; padding: 2px 5px; cursor: pointer; display: none; z-index: 5; }
    .mute-student-btn:hover { background: #e53935; }
    .cam-student-btn { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.5); border: none; color: white; font-size: 0.75rem; border-radius: 6px; padding: 2px 5px; cursor: pointer; display: none; z-index: 5; }
    .cam-student-btn:hover { background: #e53935; }
    .empty-slot { aspect-ratio: 4/3; background: #0f3460; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #a0c4ff; font-size: 0.8rem; font-weight: 700; opacity: 0.5; }

    #connecting-screen { position: fixed; inset: 0; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; width: 100vw; height: 100vh; text-align: center; padding: 20px; }
    .spinner { width: 60px; height: 60px; border: 6px solid #0f3460; border-top-color: #1a73e8; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @property --angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }
    @keyframes chase { to { --angle: 360deg; } }
    .waiting-box {
      position: relative;
      font-size: 1.3rem; font-weight: 900; color: #ffd740;
      margin-bottom: 30px; padding: 12px 24px; border-radius: 12px;
      background: rgba(255,215,64,0.08);
    }
    .waiting-box::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 14px;
      background: conic-gradient(
        from var(--angle, 0deg),
        #2ecc40 0deg 90deg,
        #ffd740 90deg 360deg
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      padding: 3px;
      animation: chase 2s linear infinite;
    }

    #waiting-screen { display: none; position: fixed; inset: 0; background: #1a1a2e; z-index: 998; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }

    /* ── MOBILE LANDSCAPE ── */
    @media screen and (max-width: 1200px) and (orientation: landscape) {
      #topbar { padding: 3px 8px; min-height: 44px; }
      #topbar img { height: 28px; }
      #room-label { display: none !important; }
      #status-bar { display: none !important; }
      #leave-btn { padding: 5px 10px; font-size: 0.75rem; }

      /* Mobile top controls bar */
      #mobile-controls {
        display: flex !important;
        align-items: center;
        gap: 6px;
      }

      /* Topbar controls on mobile - small circles */
      #topbar-controls { gap: 4px; }
      #topbar-controls .ctrl-btn { width: 34px; height: 34px; padding: 0; border-radius: 50%; font-size: 0.75rem; flex: none; }
      #mic-btn { background: #2e7d32 !important; color: white; }
      #mic-btn.active { background: #e53935 !important; }
      #cam-btn { background: #2e7d32 !important; color: white; }
      #cam-btn.active { background: #e53935 !important; }

      /* Left panel smaller */
      #left-panel { width: 90px; padding: 4px; gap: 4px; }

      /* Teacher only toolbar - icon only circles */
      #teacher-only { flex-wrap: wrap; gap: 3px; margin-top: 2px; }
      #teacher-only .tool-btn { font-size: 0; width: 34px; height: 34px; padding: 0; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
      #teacher-only .tool-btn::before { font-size: 1rem; }
      #upload-slide-btn::before { content: '🖼️'; }
      #clear-btn::before { content: '🗑️'; }
      #open-class-btn-inner::before { content: '🔓'; }
      #screenshare-btn-inner::before { content: '🖥️'; }

      /* Bottom toolbar compact */
      #toolbar { padding: 4px 8px; gap: 4px; }
      .tool-btn { padding: 6px 10px; font-size: 0.8rem; }
      #brush-size { width: 60px; }

      /* Right panel thinner */
      #right-panel { width: 80px; padding: 4px; gap: 4px; }
      #right-panel-title { font-size: 0.75rem; }

      /* Student boxes smaller */
      .student-box img, .student-box video { object-fit: cover; }

      /* Draw controls under teacher cam - scrollable */
      #draw-controls { max-height: 80px; overflow-y: auto; }
      #draw-controls button { font-size: 0.7rem; padding: 3px 6px; }
    }
  </style>
</head>
<body>

<!-- WAITING SCREEN -->
<div id="waiting-screen">
  <img src="LOGO.png" style="height:100px;margin-bottom:20px;"/>
  <p id="waiting-name" style="font-size:1.8rem;font-weight:900;color:#a0c4ff;margin-bottom:16px;">Welcome!</p>
  <p class="waiting-box">⏳ Waiting for teacher to open the class...</p>
</div>

<!-- CONNECTING SCREEN -->
<div id="connecting-screen">
  <img src="LOGO.png" alt="PolyABC" style="height:100px;display:block;margin:0 auto 20px auto;"/>
  <div class="spinner" id="spinner"></div>
  <p id="connect-msg" style="font-size:2rem;font-weight:900;color:#a0c4ff;text-align:center;margin:30px auto;width:100%;">Starting up...</p>
  <button id="enter-btn" onclick="enterClass()" style="display:none;background:#1a73e8;color:white;border:none;padding:24px 60px;border-radius:20px;font-family:Nunito,sans-serif;font-size:1.6rem;font-weight:900;cursor:pointer;box-shadow:0 8px 30px rgba(26,115,232,0.4);margin:0 auto;">
    ▶ Enter Class
  </button>
  <div id="device-error" style="display:none;margin-top:20px;background:rgba(229,57,53,0.15);border:2px solid #e53935;border-radius:12px;padding:14px 24px;max-width:400px;text-align:center;">
    <p id="device-error-msg" style="color:#ff8a80;font-size:1rem;font-weight:700;margin-bottom:10px;"></p>
    <button onclick="requestDevices()" style="background:#1a73e8;color:white;border:none;padding:10px 24px;border-radius:10px;font-family:Nunito,sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;">🔄 Try Again</button>
  </div>
  <button onclick="requestDevices()" style="margin-top:30px;background:none;border:2px solid #444;color:#888;padding:8px 20px;border-radius:10px;font-family:Nunito,sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;">❓ Camera / Mic Help</button>
</div>

<div id="topbar">
  <div id="topbar-controls" style="display:flex;align-items:center;gap:6px;">
    <button class="ctrl-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
    <button class="ctrl-btn" id="cam-btn" onclick="toggleCam()">📷</button>
    <button class="ctrl-btn" onclick="if(!document.fullscreenElement){document.documentElement.requestFullscreen()}else{document.exitFullscreen()}" style="background:#0f3460;">⛶</button>
  </div>
  <img src="LOGO.png" alt="PolyABC"/>
  <span id="room-label">Room: —</span>
  <span id="status-bar">Connecting...</span>
  <button id="leave-btn" onclick="leaveClass()">🚪 Leave Class</button>
</div>

<div id="main">
  <div id="left-panel">
    <div id="teacher-name-above" style="display:none;font-size:0.8rem;font-weight:700;color:#a0c4ff;text-align:center;padding:4px 0;"></div>
    <div class="video-box teacher-border" style="position:relative;">
      <video id="left-video" autoplay playsinline></video>
      <div class="video-label" id="left-label">...</div>
      <div class="mute-overlay" id="my-mute-icon">🔇</div>
      <div id="cam-off-logo" style="display:none;position:absolute;inset:0;background:#0f3460;border-radius:10px;align-items:center;justify-content:center;z-index:2;">
        <img src="LOGO.png" style="width:75%;object-fit:contain;"/>
      </div>
    </div>
    <div id="teacher-status" style="display:none;background:#e65100;color:white;font-size:0.8rem;font-weight:700;padding:6px 10px;border-radius:8px;text-align:center;">⚠️ Teacher disconnected...</div>
    <div id="my-controls" style="display:none;"></div>
  </div>

  <div id="center-panel">
    <div id="whiteboard-wrap">
      <canvas id="whiteboard-canvas"></canvas>
      <!-- Screen share overlay -->
      <video id="screenshare-video" autoplay playsinline style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000;z-index:10;"></video>
    </div>
    <div id="toolbar">
      <button class="tool-btn selected" id="tool-draw" onclick="setTool('draw')">✏️ Draw</button>
      <button class="tool-btn" id="tool-erase" onclick="setTool('erase')">🧹 Erase</button>
      <button class="tool-btn" id="tool-select" onclick="setTool('select')">☝️ Select</button>
      <div class="tool-separator"></div>
      <input type="color" id="color-picker" value="#000000" onchange="setColor(this.value)"/>
      <input type="range" id="brush-size" min="2" max="30" value="5" onchange="setBrushSize(this.value)"/>
      <div class="tool-separator"></div>
      <div id="teacher-only">
        <button class="tool-btn" style="background:#1a73e8;" id="upload-slide-btn" onclick="document.getElementById('img-upload').click()">🖼️ Upload Slide</button>
        <input type="file" id="img-upload" accept="image/*" style="display:none" onchange="uploadImage(event)"/>
        <button class="tool-btn" id="clear-btn" onclick="clearBoard()" style="background:#e53935;">🗑️ Clear</button>
        <button id="open-class-btn" class="tool-btn" onclick="toggleClassOpen()" data-mobile-id="open-class-btn-inner" style="background:#2e7d32;">🔓 Open Class</button>
        <button id="screenshare-btn" class="tool-btn" onclick="toggleScreenShare()" data-mobile-id="screenshare-btn-inner" style="background:#6a1b9a;">🖥️ Share Screen</button>
      </div>

    </div>
  </div>

  <div id="right-panel">
    <div id="right-panel-title">Students</div>
    <!-- Student slots added dynamically -->
  </div>
</div>

<script>
const SERVER_URL   = "https://polyabc-server.onrender.com";
const params       = new URLSearchParams(window.location.search);
const ROOM         = params.get('room') || '001';
const IS_TEACHER   = !!localStorage.getItem('adminToken');
const MY_TOKEN     = localStorage.getItem('adminToken') || localStorage.getItem('studentToken') || '';
const MY_NAME      = IS_TEACHER ? 'Teacher' : (localStorage.getItem('studentName') || 'Student');
const studentSlots = {}; // dynamic slots
const drawEnabled = {}; // socketId -> bool

document.getElementById('room-label').textContent = `Room: ${ROOM}`;
if (IS_TEACHER) {
  document.getElementById('teacher-only').style.display = 'flex';
} else {
  document.getElementById('my-controls').style.display = 'none';
}

const capCanvas = document.createElement('canvas');
capCanvas.width = 320; capCanvas.height = 240;
const capCtx    = capCanvas.getContext('2d');
let captureInterval = null;
let localStream     = null;
let myMicOn = true, myCamOn = true;
const remoteRoles   = {};
const remoteNames   = {};
let teacherSocketId = null;
let mediaRecorder   = null;
let classIsOpen     = false;
let _joinedSocket   = null;
let _joinedName     = null;

// WebRTC audio peers
const audioPeers = {};
const ICE_CONFIG = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
  ]
};

// ── STEP 1: Get camera, then connect ──
async function startMedia() {
  try {
    document.getElementById('connect-msg').textContent = 'Starting camera...';
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById('device-error') && (document.getElementById('device-error').style.display = 'none');
    if (IS_TEACHER) {
      document.getElementById('left-video').srcObject = localStream;
      document.getElementById('left-video').muted = true;
      document.getElementById('left-label').textContent = '';
    } else {
      document.getElementById('left-label').textContent = 'Waiting for teacher...';
    }
    document.getElementById('connect-msg').textContent = 'Connecting...';
    connectSocket();
  } catch(e) {
    showDeviceError(e);
  }
}

async function requestDevices() {
  const errDiv = document.getElementById('device-error');
  if (errDiv) errDiv.style.display = 'none';
  document.getElementById('connect-msg').textContent = 'Requesting camera & mic...';
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('enter-btn').style.display = 'none';
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    if (errDiv) errDiv.style.display = 'none';
    if (IS_TEACHER) {
      document.getElementById('left-video').srcObject = localStream;
      document.getElementById('left-video').muted = true;
      document.getElementById('left-label').textContent = '';
    } else {
      document.getElementById('left-label').textContent = 'Waiting for teacher...';
    }
    document.getElementById('connect-msg').textContent = 'Connecting...';
    if (!window._socket) connectSocket();
  } catch(e) {
    showDeviceError(e);
  }
}

function showDeviceError(e) {
  const errDiv = document.getElementById('device-error');
  const errMsg = document.getElementById('device-error-msg');
  if (!errDiv || !errMsg) {
    alert(getFriendlyError(e));
    return;
  }
  errMsg.textContent = getFriendlyError(e);
  errDiv.style.display = 'block';
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('connect-msg').textContent = 'Camera or mic issue';
}

function getFriendlyError(e) {
  const name = e.name || '';
  const msg  = (e.message || '').toLowerCase();
  if (name === 'NotAllowedError' || name === 'PermissionDeniedError')
    return '🚫 Camera & mic access was blocked. Please click the camera icon in your browser address bar and allow access, then try again.';
  if (name === 'NotFoundError' || name === 'DevicesNotFoundError')
    return '📷 No camera or microphone detected. Please plug one in and try again.';
  if (name === 'NotReadableError' || name === 'TrackStartError')
    return '⚠️ Camera or mic is already in use by another app. Please close it and try again.';
  if (name === 'OverconstrainedError')
    return "⚙️ Your camera does not support the required settings. Try a different browser.";
  if (msg.includes('secure') || msg.includes('https'))
    return "🔒 Camera requires a secure connection (HTTPS). Please make sure you are on the correct website.";
  return `❌ Could not access camera/mic: ${e.message || 'Unknown error'}. Please refresh and try again.`;
}

// ── STEP 2: Connect socket ──
function connectSocket() {
  const socket = io(SERVER_URL);
  window._socket = socket;

  socket.on('connect', () => {
    socket.emit('join-room', { room: ROOM, token: MY_TOKEN });
  });

  socket.on('room-joined', ({ name }) => {
    _joinedName   = name;
    _joinedSocket = socket;
    document.getElementById('waiting-screen').style.display = 'none';
    document.getElementById('connecting-screen').style.display = 'flex';
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('connect-msg').textContent = IS_TEACHER
      ? `Welcome, ${name}!`
      : `Welcome, ${name}! 👋`;
    document.getElementById('enter-btn').style.display = 'block';
  });

  socket.on('room-error', (msg) => {
    if (msg === 'CLASS_NOT_OPEN') {
      document.getElementById('connecting-screen').style.display = 'none';
      document.getElementById('waiting-screen').style.display = 'flex';
      document.getElementById('waiting-name').textContent = `Welcome, ${MY_NAME}! 👋`;
    } else {
      alert(msg || 'Could not join room.');
      window.location.href = 'index.html';
    }
  });

  socket.on('existing-users', (users) => {
    users.forEach(({ socketId, role, name }) => {
      remoteRoles[socketId] = role;
      remoteNames[socketId] = name;
      createVideoSlot(socketId, role, name);
      // Start WebRTC audio with existing users
      setTimeout(() => callAudioPeer(socketId, socket), 1000);
    });
  });

  socket.on('user-joined', ({ socketId, role, name }) => {
    remoteRoles[socketId] = role;
    remoteNames[socketId] = name;
    createVideoSlot(socketId, role, name);
    if (IS_TEACHER && canvas && canvas.getObjects().length > 0) {
      setTimeout(() => {
        socket.emit('send-canvas-to', { room: ROOM, targetId: socketId, json: canvas.toJSON() });
      }, 1500); // wait for student to fully connect
    }
  });

  socket.on('video-frame', ({ socketId, frame }) => {
    const img = document.getElementById(`vimg-${socketId}`);
    if (img) img.src = frame;
  });

  // Audio handled via WebRTC

  socket.on('user-left', (socketId) => removeRemote(socketId));

  socket.on('you-are-muted', () => {
    if (localStream) {
      localStream.getAudioTracks().forEach(t => t.enabled = false);
      myMicOn = false;
      const btn = document.getElementById('mic-btn');
      if (btn) { btn.classList.add('active'); btn.textContent = '🔇'; }
      document.getElementById('my-mute-icon').style.display = 'flex';
    }
    window._selfMuted = true;
    updateSelfMonkey();
  });

  socket.on('your-cam-toggled', ({ camOn }) => {
    if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = camOn);
    window._selfCamOff = !camOn;
    // If cam is turned back on, reset muted state visually
    if (camOn) window._selfMuted = false;
    updateSelfMonkey();
  });

  socket.on('you-are-unmuted', () => {
    window._selfMuted = false;
    updateSelfMonkey();
  });



  // Screen share from teacher
  socket.on('screenshare-start', () => {
    if (!IS_TEACHER) {
      // Don't hide canvas - screenshare-img will cover it with z-index
      // Just wait for frames to arrive
    }
  });

  socket.on('screenshare-stop', () => {
    if (!IS_TEACHER) {
      // Fully remove screenshare img
      const img = document.getElementById('screenshare-img');
      if (img) img.remove();
      // Hide screenshare video
      const vid = document.getElementById('screenshare-video');
      vid.style.display = 'none';
      // Show canvas
      const cc = document.querySelector('.canvas-container');

  socket.on('your-draw-toggled', ({ canDraw }) => {
    window._canDraw = canDraw;
    if (canvas && !IS_TEACHER) {
      // Lock/unlock all canvas interactions
      canvas.isDrawingMode = canDraw;
      canvas.selection = canDraw;
      canvas.forEachObject(obj => {
        obj.selectable = canDraw;
        obj.evented = canDraw;
      });

      canvas.renderAll();
      // Dim toolbar so student knows drawing is off
      const toolbar = document.getElementById('toolbar');
      if (toolbar) toolbar.style.opacity = canDraw ? '1' : '0.4';
      if (toolbar) toolbar.style.pointerEvents = canDraw ? 'auto' : 'none';

  socket.on('teacher-cam', ({ camOn }) => {

  socket.on('class-opened', () => {

    // Just locks door - students already inside stay
  });

        </div>`;
    }

  socket.on('teacher-disconnected', () => {
    if (!IS_TEACHER) {

      if (ts) ts.style.display = 'block';
      document.getElementById('status-bar').textContent = '🟡 Waiting...';
      document.getElementById('status-bar').style.color = '#ffd740';

  socket.on('teacher-reconnected', () => {
    if (!IS_TEACHER) {
      const ts = document.getElementById('teacher-status');
      if (ts) ts.style.display = 'none';
      document.getElementById('status-bar').textContent = '🟢 In Class';
      document.getElementById('status-bar').style.color = '#69f0ae';

  socket.on('room-full', () => {

    document.getElementById('status-bar').style.color = '#69f0ae';

  });

  // Whiteboard listeners
  socket.on('whiteboard-path', ({ path }) => {
    if (!canvas) return;
    suppressSync = true;
    fabric.util.enlivenObjects([path], (objs) => {
      objs.forEach(o => canvas.add(o)); canvas.renderAll(); suppressSync = false;
    });
  });
  socket.on('whiteboard-sync', ({ json }) => {
    if (!canvas) return;
    suppressSync = true;
    canvas.loadFromJSON(json, () => { canvas.renderAll(); suppressSync = false; });
  });
  socket.on('whiteboard-clear', () => {
    if (!canvas) return;
    suppressSync = true;
    canvas.clear(); canvas.backgroundColor = '#ffffff'; canvas.renderAll(); suppressSync = false;
  });
  socket.on('canvas-state', ({ json }) => {
    if (!canvas) return;
    suppressSync = true;
    canvas.loadFromJSON(json, () => { canvas.renderAll(); suppressSync = false; });
  });
  socket.on('whiteboard-image', ({ dataUrl, scale, left, top }) => {
    if (!canvas) return;
    suppressSync = true;
    fabric.Image.fromURL(dataUrl, (img) => {
      img.scale(scale).set({ left, top, selectable: false });
      canvas.add(img); canvas.renderAll(); suppressSync = false;
    });
  });
}

// ── Video relay ──
function startVideoCapture(socket) {
  if (IS_TEACHER) {
    const src = document.getElementById('left-video');
    captureInterval = setInterval(() => {
      if (!localStream || !myCamOn) return;
      try {
        capCtx.drawImage(src, 0, 0, 320, 240);
        socket.emit('video-frame', { room: ROOM, frame: capCanvas.toDataURL('image/jpeg', 0.45) });
      } catch(e) {}
    }, 150);
  } else {
    const pipVid = document.createElement('video');
    pipVid.srcObject = localStream;
    pipVid.muted = true;
    pipVid.autoplay = true;
    pipVid.play();

    // Preload monkey images for when cam is off
    const monkeyImg = new Image();
    const monkeyImg2 = new Image();
    monkeyImg.src = 'nosee.png';
    monkeyImg2.src = 'noseeandhear.png';

    captureInterval = setInterval(() => {
      if (!localStream) return;
      try {
        if (!myCamOn) {
          // Send monkey image instead of blank frame
          const monkey = (!myMicOn) ? monkeyImg2 : monkeyImg;
          if (monkey.complete && monkey.naturalWidth > 0) {
            capCtx.clearRect(0, 0, 320, 240);
            capCtx.fillStyle = '#1a1a2e';
            capCtx.fillRect(0, 0, 320, 240);
            capCtx.drawImage(monkey, 40, 20, 240, 200);
            socket.emit('video-frame', { room: ROOM, frame: capCanvas.toDataURL('image/jpeg', 0.45) });
          }
        } else {
          capCtx.drawImage(pipVid, 0, 0, 320, 240);
          socket.emit('video-frame', { room: ROOM, frame: capCanvas.toDataURL('image/jpeg', 0.45) });
        }
      } catch(e) {}
    }, 150);
  }
}

function startAudioRelay(socket) {
  if (!localStream) return;
  // Use WebRTC for audio - much more reliable than socket relay
  // Audio peers will be created when users join
  window._audioSocket = socket;

  // Listen for audio WebRTC signals
  socket.on('audio-offer', async ({ from, offer }) => {
    const pc = createAudioPeer(from, socket);
    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('audio-answer', { to: from, answer: pc.localDescription });
  });

  socket.on('audio-answer', async ({ from, answer }) => {
    const pc = audioPeers[from];
    if (pc) await pc.setRemoteDescription(new RTCSessionDescription(answer));
  });

  socket.on('audio-ice', async ({ from, candidate }) => {
    const pc = audioPeers[from];
    if (pc) { try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch(e) {} }
  });
}

function createAudioPeer(targetId, socket) {
  if (audioPeers[targetId]) return audioPeers[targetId];
  const pc = new RTCPeerConnection(ICE_CONFIG);

  // Add audio track only
  if (localStream) {
    localStream.getAudioTracks().forEach(t => pc.addTrack(t, localStream));
  }

  pc.onicecandidate = (e) => {
    if (e.candidate) socket.emit('audio-ice', { to: targetId, candidate: e.candidate });
  };

  pc.ontrack = (e) => {
    const audio = new Audio();
    audio.srcObject = e.streams[0];
    audio.autoplay = true;
    audio.play().catch(() => {});
    document.body.appendChild(audio);
    audio.id = `audio-${targetId}`;
  };

  audioPeers[targetId] = pc;
  return pc;
}

async function callAudioPeer(targetId, socket) {
  const pc = createAudioPeer(targetId, socket);
  const offer = await pc.createOffer({ offerToReceiveAudio: true });
  await pc.setLocalDescription(offer);
  socket.emit('audio-offer', { to: targetId, offer: pc.localDescription });
}

function removeAudioPeer(socketId) {
  if (audioPeers[socketId]) {
    audioPeers[socketId].close();
    delete audioPeers[socketId];
    const audio = document.getElementById(`audio-${socketId}`);
    if (audio) audio.remove();
  }
}

// ── Whiteboard ──
const CANVAS_W = 1440, CANVAS_H = 1080;
let canvas, currentTool = 'draw', suppressSync = false;

function initWhiteboard(socket) {
  if (window._whiteboardInit) return;
  window._whiteboardInit = true;
  canvas = new fabric.Canvas('whiteboard-canvas', {
    width: CANVAS_W, height: CANVAS_H,
    isDrawingMode: true, backgroundColor: '#ffffff'
  });
  canvas.freeDrawingBrush.color = '#000000';
  canvas.freeDrawingBrush.width = 5;
  scaleCanvas();
  window.addEventListener('resize', scaleCanvas);
  setupOwnSlot();
  canvas.on('path:created', (e) => {
    if (suppressSync) return;
    window._socket.emit('whiteboard-path', { room: ROOM, path: e.path.toJSON() });
  });
  canvas.on('object:modified', () => {
    if (suppressSync) return;
    window._socket.emit('whiteboard-sync', { room: ROOM, json: canvas.toJSON() });
  });
}

function scaleCanvas() {
  const wrap = document.getElementById('whiteboard-wrap');
  const wrapW = wrap.clientWidth;
  const wrapH = wrap.clientHeight;
  // Scale to fit both width AND height - no overflow
  const scale = Math.min(wrapW / CANVAS_W, wrapH / CANVAS_H);
  const container = document.querySelector('.canvas-container');
  if (container) {
    container.style.transform = `scale(${scale})`;
    container.style.transformOrigin = 'top left';
  }
  wrap.style.overflow = 'hidden';
  wrap.style.background = '#ffffff';
}

function setTool(tool) {
  // If student drawing is disabled, don't allow tool changes
  if (!IS_TEACHER && window._canDraw === false) return;
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById(`tool-${tool}`).classList.add('selected');
  if (tool === 'draw') {
    canvas.isDrawingMode = true;
    canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
    canvas.freeDrawingBrush.color = document.getElementById('color-picker').value;
    canvas.freeDrawingBrush.width = parseInt(document.getElementById('brush-size').value);
  } else if (tool === 'erase') {
    canvas.isDrawingMode = true;
    canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
    canvas.freeDrawingBrush.color = '#ffffff';
    canvas.freeDrawingBrush.width = 20;
  } else { canvas.isDrawingMode = false; }
}

function setColor(c) { if (currentTool === 'draw' && canvas) canvas.freeDrawingBrush.color = c; }
function setBrushSize(s) { if (canvas && canvas.freeDrawingBrush) canvas.freeDrawingBrush.width = parseInt(s); }

function clearBoard() {
  if (!IS_TEACHER) return;
  canvas.clear(); canvas.backgroundColor = '#ffffff'; canvas.renderAll();
  if (window._socket) window._socket.emit('whiteboard-clear', { room: ROOM });
}

function uploadImage(event) {
  if (!IS_TEACHER) return;
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    fabric.Image.fromURL(e.target.result, (img) => {
      const scale = Math.min((CANVAS_W * 0.85) / img.width, (CANVAS_H * 0.85) / img.height);
      img.scale(scale).set({ left: 40, top: 40, selectable: true });
      canvas.add(img); canvas.renderAll();
      if (window._socket) window._socket.emit('whiteboard-image', { room: ROOM, dataUrl: e.target.result, scale, left: 40, top: 40 });
    });
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

let isSharing = false;

async function toggleScreenShare() {
  if (isSharing) { stopScreenShare(); return; }
  try {
    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: 'always' }, audio: true });
    isSharing = true;
    const vid = document.getElementById('screenshare-video');
    vid.srcObject = screenStream;
    vid.style.display = 'block';
    const cc = document.querySelector('.canvas-container');
    if (cc) cc.style.visibility = 'hidden';
    const btn = document.getElementById('screenshare-btn');
    if (btn) { btn.textContent = '🛑 Stop Sharing'; btn.style.background = '#e53935'; }
    const capCv = document.createElement('canvas');
    capCv.width = 1280; capCv.height = 720;
    const capCx = capCv.getContext('2d');
    window._shareInterval = setInterval(() => {
      if (!isSharing) return;
      try {
        capCx.drawImage(vid, 0, 0, 1280, 720);
        if (window._socket) window._socket.emit('screenshare-frame', { room: ROOM, frame: capCv.toDataURL('image/jpeg', 0.5) });
      } catch(e) {}
    }, 150);
    if (window._socket) window._socket.emit('screenshare-start', { room: ROOM });
    screenStream.getVideoTracks()[0].onended = () => stopScreenShare();
  } catch(e) {
    if (e.name !== 'NotAllowedError') alert('Could not start screen share: ' + e.message);
  }
}

function stopScreenShare() {
  isSharing = false;
  if (window._shareInterval) { clearInterval(window._shareInterval); window._shareInterval = null; }
  if (screenStream) { screenStream.getTracks().forEach(t => t.stop()); screenStream = null; }
  // Hide screen share video
  const vid = document.getElementById('screenshare-video');
  vid.style.display = 'none'; vid.srcObject = null;
  // Show canvas properly
  const cc = document.querySelector('.canvas-container');
  if (cc) cc.style.visibility = 'visible';
  if (canvas) setTimeout(() => canvas.renderAll(), 100);
  const btn = document.getElementById('screenshare-btn');
  if (btn) { btn.textContent = '🖥️ Share Screen'; btn.style.background = '#6a1b9a'; }
  if (window._socket) {
    window._socket.emit('screenshare-stop', { room: ROOM });
    // Resend canvas state to all students
    setTimeout(() => {
      if (canvas) window._socket.emit('whiteboard-sync', { room: ROOM, json: canvas.toJSON() });
    }, 300);
  }
}

startMedia();
</script>
