<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="LOGO.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PolyABC - My Schedule</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #1a1a2e; min-height: 100vh; color: white; }

    #topbar {
      background: #16213e;
      border-bottom: 2px solid #0f3460;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #topbar img { height: 40px; }
    #topbar .teacher-name { font-size: 1rem; font-weight: 900; color: #a0c4ff; }

    .back-btn {
      background: #0f3460;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 10px;
      font-family: Nunito, sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .back-btn:hover { background: #1a73e8; }

    #main { max-width: 1000px; margin: 0 auto; padding: 24px 16px; }

    .section-title {
      font-size: 1.1rem;
      font-weight: 900;
      color: #a0c4ff;
      margin-bottom: 14px;
      margin-top: 24px;
    }

    /* DAY HOURS */
    #day-hours-card {
      background: #16213e;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .day-hours-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }
    .day-hour-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .day-hour-label { font-size: 0.8rem; font-weight: 900; color: #a0c4ff; }
    .day-hour-input {
      width: 100%;
      background: #0f3460;
      border: 2px solid #1a73e8;
      border-radius: 8px;
      color: white;
      font-family: Nunito, sans-serif;
      font-size: 0.75rem;
      padding: 5px;
      text-align: center;
      outline: none;
    }
    .day-hour-input::placeholder { color: #556; }

    /* CALENDAR */
    #calendar-card {
      background: #16213e;
      border-radius: 16px;
      padding: 20px;
    }
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 16px;
    }
    .cal-nav button {
      background: #0f3460;
      border: none;
      color: white;
      font-size: 1.2rem;
      width: 36px; height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-weight: 900;
    }
    .cal-nav button:hover { background: #1a73e8; }
    .cal-nav h2 { font-size: 1.3rem; font-weight: 900; color: white; min-width: 180px; text-align: center; }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-header {
      text-align: center;
      font-size: 0.78rem;
      font-weight: 900;
      color: #a0c4ff;
      padding: 6px 0;
    }
    .cal-day {
      aspect-ratio: 1;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s;
      position: relative;
      padding: 4px;
      min-height: 52px;
    }
    .cal-day:hover { transform: scale(1.05); }
    .cal-day.other-month { opacity: 0.25; cursor: default; pointer-events: none; }
    .cal-day.past { opacity: 0.4; cursor: default; pointer-events: none; }
    .cal-day.today { outline: 2px solid #ffd740; }
    .cal-day.unavailable { background: #e8e8e8; color: #999; }
    .cal-day.available { background: #39ff14; color: #1a5e00; }
    .cal-day.assigned { background: linear-gradient(135deg,#ff8c00,#ffb347); color: white; cursor: default; }
    .cal-day .day-num { font-size: 0.85rem; font-weight: 900; }
    .cal-day .day-dot { font-size: 0.6rem; margin-top: 2px; }

    /* LEGEND */
    .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 14px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #a0c4ff; }
    .legend-dot { width: 14px; height: 14px; border-radius: 4px; }

    /* ASSIGNMENT MODAL */
    #assignment-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    #assignment-box {
      background: #16213e;
      border-radius: 20px;
      padding: 28px;
      max-width: 380px;
      width: 90%;
    }
    #assignment-box h3 { font-size: 1.1rem; font-weight: 900; color: #ffd740; margin-bottom: 16px; }
    .assignment-row {
      background: #0f3460;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 10px;
    }
    .assignment-row .a-time { font-size: 1rem; font-weight: 900; color: #a0c4ff; }
    .assignment-row .a-detail { font-size: 0.85rem; color: #ccc; margin-top: 4px; }

    /* SAVE BAR */
    #save-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #16213e;
      border-top: 2px solid #0f3460;
      padding: 12px 24px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      z-index: 100;
    }
    .btn-save {
      background: #1a73e8;
      color: white;
      border: none;
      padding: 10px 28px;
      border-radius: 10px;
      font-family: Nunito, sans-serif;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
    }
    .btn-save:hover { background: #1558b0; }
    .save-msg { color: #69f0ae; font-weight: 700; font-size: 0.95rem; align-self: center; display: none; }
  </style>
</head>
<body>

<div id="topbar">
  <img src="LOGO.png" alt="PolyABC"/>
  <span class="teacher-name" id="teacher-name-label">Loading...</span>
  <button class="back-btn" onclick="goBack()">← Back</button>
</div>

<div id="main">
  <p class="section-title">🕐 My Available Hours (per day of week)</p>
  <div id="day-hours-card">
    <div class="day-hours-grid" id="day-hours-grid"></div>
  </div>

  <p class="section-title">📅 My Availability Calendar</p>
  <div id="calendar-card">
    <div class="cal-nav">
      <button onclick="prevMonth()">‹</button>
      <h2 id="cal-title"></h2>
      <button onclick="nextMonth()">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#39ff14;"></div> Available</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e8e8e8;border:1px solid #ccc;"></div> Unavailable</div>
      <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#ff8c00,#ffb347);"></div> Class Assigned</div>
    </div>
  </div>
</div>

<div id="save-bar">
  <span class="save-msg" id="save-msg">✅ Saved!</span>
  <button class="btn-save" onclick="saveAvailability()">💾 Save Schedule</button>
</div>

<!-- ASSIGNMENT DETAIL MODAL -->
<div id="assignment-modal" onclick="closeAssignmentModal(event)">
  <div id="assignment-box">
    <h3 id="assignment-date-title">📋 Classes on this day</h3>
    <div id="assignment-list"></div>
    <button onclick="document.getElementById('assignment-modal').style.display='none'" style="margin-top:12px;background:#0f3460;border:none;color:#a0c4ff;padding:10px 20px;border-radius:10px;font-family:Nunito,sans-serif;font-weight:700;cursor:pointer;width:100%;">Close</button>
  </div>
</div>

<script>
  const SERVER_URL = "https://polyabc-server.onrender.com";
  const token = localStorage.getItem('teacherToken');
  if (!token) { window.location.href = 'greeting.html'; }

  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  let viewYear  = new Date().getFullYear();
  let viewMonth = new Date().getMonth();
  let dayHours  = {}; // { Mon: { start: '09:00', end: '21:00' }, ... }
  let dates     = {}; // { 'YYYY-MM-DD': 'available' | 'unavailable' }
  let assignments = []; // from server

  async function init() {
    // Load teacher info
    const res = await fetch(`${SERVER_URL}/teacher-info`, { headers: { Authorization: `Bearer ${token}` } });
    const info = await res.json();
    document.getElementById('teacher-name-label').textContent = `${info.teacherName || 'Teacher'} — Room ${info.room}`;

    // Load availability
    const aRes = await fetch(`${SERVER_URL}/availability`, { headers: { Authorization: `Bearer ${token}` } });
    const aData = await aRes.json();
    dayHours = aData.dayHours || {};
    dates    = aData.dates    || {};

    // Load assignments
    const asRes = await fetch(`${SERVER_URL}/assignments`, { headers: { Authorization: `Bearer ${token}` } });
    assignments = await asRes.json();

    renderDayHours();
    renderCalendar();
  }

  function renderDayHours() {
    const grid = document.getElementById('day-hours-grid');
    grid.innerHTML = DAYS.map(d => `
      <div class="day-hour-col">
        <div class="day-hour-label">${d}</div>
        <input class="day-hour-input" type="time" id="dh-start-${d}" value="${dayHours[d]?.start || ''}" placeholder="Start"/>
        <input class="day-hour-input" type="time" id="dh-end-${d}"   value="${dayHours[d]?.end   || ''}" placeholder="End"/>
      </div>
    `).join('');
  }

  function renderCalendar() {
    const title = document.getElementById('cal-title');
    title.textContent = `${MONTHS[viewMonth]} ${viewYear}`;

    const grid = document.getElementById('cal-grid');
    const today = new Date(); today.setHours(0,0,0,0);

    // Headers
    let html = DAYS.map(d => `<div class="cal-header">${d}</div>`).join('');

    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const prevDays = new Date(viewYear, viewMonth, 0).getDate();

    // Prev month padding
    for (let i = firstDay - 1; i >= 0; i--) {
      html += `<div class="cal-day other-month"><span class="day-num">${prevDays - i}</span></div>`;
    }

    // Current month
    for (let d = 1; d <= daysInMonth; d++) {
      const date = new Date(viewYear, viewMonth, d);
      const dateStr = toDateStr(date);
      const isPast = date < today;
      const isToday = date.getTime() === today.getTime();
      const assigned = assignments.filter(a => a.date === dateStr);
      const status = dates[dateStr] || 'unavailable';

      let cls = 'cal-day';
      if (isPast) cls += ' past';
      if (isToday) cls += ' today';
      if (assigned.length > 0) cls += ' assigned';
      else if (status === 'available') cls += ' available';
      else cls += ' unavailable';

      const dot = assigned.length > 0 ? `<span class="day-dot">📋 ${assigned.length}</span>` : '';
      const click = assigned.length > 0
        ? `onclick="showAssignments('${dateStr}')"`
        : isPast ? '' : `onclick="toggleDay('${dateStr}')"`;

      html += `<div class="${cls}" ${click}><span class="day-num">${d}</span>${dot}</div>`;
    }

    // Next month padding
    const total = firstDay + daysInMonth;
    const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
    for (let i = 1; i <= remaining; i++) {
      html += `<div class="cal-day other-month"><span class="day-num">${i}</span></div>`;
    }

    grid.innerHTML = html;
  }

  function toggleDay(dateStr) {
    const current = dates[dateStr] || 'unavailable';
    dates[dateStr] = current === 'available' ? 'unavailable' : 'available';
    renderCalendar();
  }

  function showAssignments(dateStr) {
    const modal = document.getElementById('assignment-modal');
    const list  = document.getElementById('assignment-list');
    const title = document.getElementById('assignment-date-title');
    const dayAssignments = assignments.filter(a => a.date === dateStr);
    title.textContent = `📋 Classes on ${dateStr}`;
    list.innerHTML = dayAssignments.map(a => `
      <div class="assignment-row">
        <div class="a-time">🕐 ${fmt12(a.time)}</div>
        <div class="a-detail">👥 ${a.students} student${a.students !== 1 ? 's' : ''} &nbsp;|&nbsp; 🎓 Level ${a.level} &nbsp;|&nbsp; ⏱ ${a.classType}</div>
      </div>
    `).join('') || '<div style="color:#888;text-align:center;">No classes assigned.</div>';
    modal.style.display = 'flex';
  }

  function closeAssignmentModal(e) {
    if (e.target === document.getElementById('assignment-modal'))
      document.getElementById('assignment-modal').style.display = 'none';
  }

  async function saveAvailability() {
    // Collect day hours
    DAYS.forEach(d => {
      const start = document.getElementById(`dh-start-${d}`)?.value;
      const end   = document.getElementById(`dh-end-${d}`)?.value;
      if (start && end) dayHours[d] = { start, end };
      else delete dayHours[d];
    });

    await fetch(`${SERVER_URL}/availability`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ dayHours, dates })
    });

    const msg = document.getElementById('save-msg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 2500);
  }

  function prevMonth() {
    viewMonth--;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    renderCalendar();
  }

  function nextMonth() {
    viewMonth++;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    renderCalendar();
  }

  function toDateStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function fmt12(t) {
    if (!t) return '';
    const [h, m] = t.split(':');
    const hr = parseInt(h), ampm = hr >= 12 ? 'PM' : 'AM';
    return `${hr % 12 || 12}:${m} ${ampm}`;
  }

  function goBack() {
    window.location.href = 'greeting.html';
  }

  init();
</script>
</body>
</html>
