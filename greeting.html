<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="icon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PolyABC - Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px 24px;
    }

    .logo { height: 70px; margin-bottom: 8px; }

    .welcome-title {
      font-size: 1.3rem;
      font-weight: 900;
      color: white;
      text-align: center;
      margin-bottom: 4px;
    }

    .welcome-sub { display: none; }

    .card {
      background: #16213e;
      border-radius: 20px;
      padding: 20px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .greeting-btn {
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-family: Nunito, sans-serif;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .greeting-btn:hover { transform: scale(1.02); }

    .btn-enter    { background: #1a73e8; color: white; }
    .btn-enter:hover { background: #1558b0; }

    .btn-schedule { background: #0f3460; color: #a0c4ff; border: 2px solid #1a73e8; }
    .btn-schedule:hover { background: #1a3a6e; }

    @keyframes pulse-red {
    0%   { box-shadow: 0 0 0 0 rgba(229,57,53,0.7); }
    70%  { box-shadow: 0 0 0 8px rgba(229,57,53,0); }
    100% { box-shadow: 0 0 0 0 rgba(229,57,53,0); }
  }
    .btn-exit:hover { border-color: #e53935; color: #e53935; background: transparent; }

    .room-badge {
      text-align: center;
      font-size: 0.85rem;
      font-weight: 700;
      color: #556;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<img src="LOGO.png" class="logo" alt="PolyABC"/>
<div class="welcome-title">Welcome, Teacher <span id="teacher-name">Teacher</span>!</div>
<div class="welcome-sub" id="room-sub">Room —</div>

<div class="card">
  <button class="greeting-btn btn-enter" onclick="enterClass()">
    🎓 Enter Class
  </button>
  <button class="greeting-btn btn-schedule" onclick="goSchedule()" style="position:relative;">
    📅 My Schedule
    <span id="notif-badge" style="display:none;position:absolute;top:-6px;right:-6px;background:#e53935;color:white;border-radius:50%;min-width:22px;height:22px;font-size:0.75rem;font-weight:900;align-items:center;justify-content:center;padding:0 4px;animation:pulse-red 1s infinite;"></span>
  </button>
  <button class="greeting-btn btn-exit" onclick="exitToLogin()">
    🚪 Exit
  </button>
</div>

<div class="room-badge" id="room-badge"></div>

<script>
  const SERVER_URL = "https://polyabc-server.onrender.com";

  // Request fullscreen on mobile
  if (/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)) {
    document.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      }
    }, { once: true });
  }

  // Check token
  const token = localStorage.getItem('teacherToken');
  const room  = localStorage.getItem('teacherRoom');
  const name  = localStorage.getItem('teacherName');

  if (!token || !room) {
    window.location.href = 'index.html';
  }

  document.getElementById('teacher-name').textContent = name || 'Teacher';
  document.getElementById('room-sub').textContent = `Room ${room}`;

  // Check for new assignments since last schedule view
  async function checkNewAssignments() {
    try {
      const lastViewed = localStorage.getItem(`lastScheduleView_${room}`) || '2000-01-01T00:00:00.000Z';
      const res = await fetch(`${SERVER_URL}/assignments?room=${room}`, { headers: { Authorization: `Bearer ${token}` } });
      const assignments = await res.json();
      const newCount = assignments.filter(a => a.createdAt && a.createdAt > lastViewed).length;
      const badge = document.getElementById('notif-badge');
      if (newCount > 0) {
        badge.textContent = newCount;
        badge.style.display = 'flex';
      } else {
        badge.style.display = 'none';
      }
    } catch(e) {}
  }
  checkNewAssignments();

  function enterClass() {
    window.location.href = `classroom.html?room=${room}`;
  }

  function goSchedule() {
    window.location.href = 'schedule.html';
  }

  function exitToLogin() {
    localStorage.removeItem('teacherToken');
    localStorage.removeItem('teacherRoom');
    localStorage.removeItem('teacherName');
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
