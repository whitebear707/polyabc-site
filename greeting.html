<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="icon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PolyABC - Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px 24px;
    }

    .logo { height: 70px; margin-bottom: 8px; }

    .welcome-title {
      font-size: 1.3rem;
      font-weight: 900;
      color: white;
      text-align: center;
      margin-bottom: 4px;
    }

    .welcome-sub { display: none; }

    .card {
      background: #16213e;
      border-radius: 20px;
      padding: 20px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .greeting-btn {
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-family: Nunito, sans-serif;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .greeting-btn:hover { transform: scale(1.02); }

    .btn-enter    { background: #1a73e8; color: white; }
    .btn-enter:hover { background: #1558b0; }

    .btn-schedule { background: #0f3460; color: #a0c4ff; border: 2px solid #1a73e8; }
    .btn-schedule:hover { background: #1a3a6e; }

    @keyframes pulse-red {
    0%   { box-shadow: 0 0 0 0 rgba(229,57,53,0.7); }
    70%  { box-shadow: 0 0 0 8px rgba(229,57,53,0); }
    100% { box-shadow: 0 0 0 0 rgba(229,57,53,0); }
  }
    .btn-exit:hover { border-color: #e53935; color: #e53935; background: transparent; }

    .room-badge {
      text-align: center;
      font-size: 0.85rem;
      font-weight: 700;
      color: #556;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<img src="LOGO.png" class="logo" alt="PolyABC"/>
<div class="welcome-title">Welcome, Teacher <span id="teacher-name">Teacher</span>!</div>
<div class="welcome-sub" id="room-sub">Room —</div>

<div class="card">
  <button class="greeting-btn btn-enter" onclick="enterClass()">
    🎓 Enter Class
  </button>
  <button class="greeting-btn btn-schedule" onclick="goSchedule()" style="position:relative;">
    📅 My Schedule
    <span id="notif-badge" style="display:none;position:absolute;top:-6px;right:-6px;background:#e53935;color:white;border-radius:50%;min-width:22px;height:22px;font-size:0.75rem;font-weight:900;align-items:center;justify-content:center;padding:0 4px;animation:pulse-red 1s infinite;"></span>
  </button>
  <button class="greeting-btn btn-exit" onclick="exitToLogin()">
    🚪 Exit
  </button>
</div>

<div class="room-badge" id="room-badge"></div>

<!-- Network test result — shown before entering class -->
<div id="network-result" style="width:100%;max-width:380px;margin-top:10px;border-radius:12px;padding:10px 14px;font-size:0.85rem;font-weight:700;text-align:center;display:none;"></div>

<script>
  const SERVER_URL = "https://polyabc-server.onrender.com";

  // Request fullscreen on mobile
  if (/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)) {
    document.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      }
    }, { once: true });
  }

  // Check token
  const token = localStorage.getItem('teacherToken');
  const room  = localStorage.getItem('teacherRoom');
  const name  = localStorage.getItem('teacherName');

  if (!token || !room) {
    window.location.href = 'index.html';
  }

  document.getElementById('teacher-name').textContent = name || 'Teacher';
  document.getElementById('room-sub').textContent = `Room ${room}`;

  // Check for new assignments since last schedule view
  async function checkNewAssignments() {
    try {
      const lastViewed = localStorage.getItem(`lastScheduleView_${room}`) || '2000-01-01T00:00:00.000Z';
      const res = await fetch(`${SERVER_URL}/assignments?room=${room}`, { headers: { Authorization: `Bearer ${token}` } });
      const assignments = await res.json();
      const newCount = assignments.filter(a => a.createdAt && a.createdAt > lastViewed).length;
      const badge = document.getElementById('notif-badge');
      if (newCount > 0) {
        badge.textContent = newCount;
        badge.style.display = 'flex';
      } else {
        badge.style.display = 'none';
      }
    } catch(e) {}
  }
  checkNewAssignments();

  // Run network test in background on page load so result is ready before teacher enters class
  getActiveSessionId().then(sessionId => runNetworkTest(sessionId));

  function nowGDLMins() {
    const now = new Date().toLocaleString('en-US', { timeZone: 'America/Mexico_City', hour: '2-digit', minute: '2-digit', hour12: false });
    const [h, m] = now.split(':').map(Number);
    return h * 60 + m;
  }

  async function getActiveSessionId() {
    try {
      const res = await fetch(`${SERVER_URL}/assignments?room=${room}`, { headers: { Authorization: `Bearer ${token}` } });
      const assignments = await res.json();
      if (!assignments.length) return null;

      // Find the assignment closest to now (within 90 min window) — same day only
      const today = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Mexico_City' });
      const todayAssignments = assignments.filter(a => a.date === today);
      if (!todayAssignments.length) return null;

      const nowMins = nowGDLMins();
      let best = null, bestDiff = Infinity;
      for (const a of todayAssignments) {
        const [hh, mm] = a.time.split(':').map(Number);
        const aMins = hh * 60 + mm;
        const diff = Math.abs(nowMins - aMins);
        if (diff < bestDiff && diff <= 90) { bestDiff = diff; best = a; }
      }
      return best?.sessionId || null;
    } catch(e) { return null; }
  }

  async function runNetworkTest(sessionId) {
    // Skip if already tested for this sessionId
    const cacheKey = `nettest_${sessionId}`;
    if (sessionId && localStorage.getItem(cacheKey)) return JSON.parse(localStorage.getItem(cacheKey));

    const resultEl = document.getElementById('network-result');
    resultEl.style.display = 'block';
    resultEl.style.background = '#0f3460';
    resultEl.style.color = '#a0c4ff';
    resultEl.textContent = '🔍 Checking your connection...';

    const pings = [];
    let failed = 0;
    const attempts = 5;

    for (let i = 0; i < attempts; i++) {
      try {
        const start = performance.now();
        await fetch(`${SERVER_URL}/server-time?_=${Date.now()}`, { cache: 'no-store' });
        pings.push(Math.round(performance.now() - start));
      } catch(e) { failed++; }
    }

    const packetLoss = Math.round((failed / attempts) * 100);
    const avgPing = pings.length ? Math.round(pings.reduce((a,b) => a+b, 0) / pings.length) : 9999;

    let quality, color, bg, message;
    if (avgPing < 150 && packetLoss === 0) {
      quality = 'good'; color = '#00e676'; bg = 'rgba(0,230,118,0.1)';
      message = `🟢 Great connection — ${avgPing}ms ping`;
    } else if (avgPing < 400 && packetLoss <= 20) {
      quality = 'fair'; color = '#ffd740'; bg = 'rgba(255,215,64,0.1)';
      message = `🟡 Fair connection — ${avgPing}ms ping${packetLoss > 0 ? `, ${packetLoss}% packet loss` : ''}. Class may have minor issues.`;
    } else {
      quality = 'poor'; color = '#ff5252'; bg = 'rgba(255,82,82,0.1)';
      message = `🔴 Unstable connection — ${avgPing}ms ping${packetLoss > 0 ? `, ${packetLoss}% packet loss` : ''}. If you experience issues during class, please check your internet connection.`;
    }

    resultEl.style.background = bg;
    resultEl.style.color = color;
    resultEl.style.border = `1px solid ${color}`;
    resultEl.textContent = message;

    const result = { avgPing, packetLoss, quality, testedAt: new Date().toISOString() };

    // Cache so reconnects skip the test
    if (sessionId) localStorage.setItem(cacheKey, JSON.stringify(result));

    return result;
  }

  async function stampNetworkTest(sessionId, result) {
    if (!sessionId || !result) return;
    try {
      await fetch(`${SERVER_URL}/attendance/network-test`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ sessionId, networkTest: result })
      });
    } catch(e) {}
  }

  async function enterClass() {
    const sessionId = await getActiveSessionId();
    // Run network test (skipped automatically if already done for this session)
    const netResult = await runNetworkTest(sessionId);
    // Stamp on attendance record
    if (sessionId) await stampNetworkTest(sessionId, netResult);
    const url = sessionId
      ? `classroom.html?room=${room}&sessionId=${sessionId}`
      : `classroom.html?room=${room}`;
    // Short delay so user sees the result before entering
    setTimeout(() => { window.location.href = url; }, netResult?.quality === 'good' ? 800 : 2000);
  }

  function goSchedule() {
    window.location.href = 'schedule.html';
  }

  function exitToLogin() {
    localStorage.removeItem('teacherToken');
    localStorage.removeItem('teacherRoom');
    localStorage.removeItem('teacherName');
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
