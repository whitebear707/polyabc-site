<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="LOGO.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    @media screen and (orientation: portrait) and (max-width: 768px) {
      #rotate-msg {
        display: flex !important;
      }
    }
  </style>
  <title>PolyABC - Learn English Online</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #f0f7ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .logo img {
      height: 100px;
      margin-bottom: 8px;
      display: block;
    }

    .tagline {
      font-size: 1.1rem;
      color: #666;
      margin-bottom: 50px;
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }

    .view-title {
      font-size: 1.4rem;
      font-weight: 900;
      color: #1a73e8;
      margin-bottom: 24px;
      text-align: center;
    }

    label {
      display: block;
      font-weight: 700;
      color: #444;
      margin-bottom: 6px;
      font-size: 1rem;
    }

    input {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: 2px solid #ddd;
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #1a73e8; }

    .btn-join {
      display: block;
      width: 100%;
      padding: 22px;
      border-radius: 16px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
      background: #1a73e8;
      color: white;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-join:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
    .btn-join:active { transform: translateY(0); }
    .btn-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #e53935;
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 14px;
      text-align: center;
      display: none;
    }

    .admin-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: #bbb;
      font-size: 0.88rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .admin-link:hover { color: #1a73e8; }
  </style>
</head>
<body>

  <div class="logo"><img src="LOGO.png" alt="PolyABC"/></div>
  <p class="tagline">Learn English from anywhere</p>

  <div class="card">
    <div class="view-title">📚 Join a Class</div>
    <div class="error-msg" id="join-error">Wrong room or password. Please try again.</div>

    <label for="room-input">Classroom Number <span style="font-weight:400;color:#aaa;font-size:0.85rem;">(optional — leave blank if unsure)</span></label>
    <input type="text" id="room-input" placeholder="e.g. 10 — or leave blank" maxlength="10" inputmode="numeric"/>

    <label for="pass-input">Password</label>
    <input type="password" id="pass-input" placeholder="Enter your password"/>

    <button class="btn-join" onclick="joinClass()">Enter Class →</button>
  </div>

  <!-- Small discreet link for admin/teacher to go to their panel -->
  <a class="admin-link" href="admin.html">Admin / Teacher Panel</a>

  <script>
    // ---- Your backend server URL goes here ----
    const SERVER_URL = "https://polyabc-server.onrender.com";

    async function joinClass() {
      const roomRaw = document.getElementById('room-input').value.trim();
      const pass = document.getElementById('pass-input').value.trim();

      if (!pass) {
        alert('Please enter your password.');
        return;
      }

      // If room field has letters (not a room number), ignore it and do lookup
      const room = /^\d+$/.test(roomRaw) ? roomRaw : '';

      const btn = document.querySelector('.btn-join');
      btn.disabled = true;
      document.getElementById('join-error').style.display = 'none';
      let secs = 55;
      btn.innerHTML = `<span class="btn-spinner"></span> 🔍 Looking for class... ${secs}s`;
      const countdown = setInterval(() => {
        secs--;
        if (secs > 0) btn.innerHTML = `<span class="btn-spinner"></span> 🔍 Looking for class... ${secs}s`;
        else clearInterval(countdown);
      }, 1000);
      window._loginCountdown = countdown;

      try {
        // If room is given, use normal login
        // If no room, look up student by password to find their room
        let targetRoom = room;
        if (!targetRoom) {
          const lookupRes = await fetch(`${SERVER_URL}/student-lookup`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pass })
          });
          const lookupData = await lookupRes.json();
          if (!lookupData.success) {
            clearInterval(window._loginCountdown);
            document.getElementById('join-error').textContent = lookupData.message || 'Password not found. Please check with your admin.';
            document.getElementById('join-error').style.display = 'block';
            btn.innerHTML = 'Enter Class →'; btn.disabled = false;
            return;
          }
          targetRoom = lookupData.room;
        }

        const res = await fetch(`${SERVER_URL}/validate-room`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ room: targetRoom, password: pass })
        });
        const data = await res.json();
        clearInterval(window._loginCountdown);

        if (data.success) {
          if (data.role === 'teacher') {
            localStorage.setItem('teacherToken', data.token);
            localStorage.setItem('teacherRoom', targetRoom);
            localStorage.setItem('teacherName', data.name || 'Teacher');
            localStorage.setItem('adminToken', data.token);
            localStorage.removeItem('studentToken');
            window.location.href = 'greeting.html';
          } else {
            localStorage.removeItem('adminToken');
            localStorage.setItem('studentToken', data.token);
            localStorage.setItem('studentName', data.name);
            window.location.href = `classroom.html?room=${targetRoom}`;
          }
        } else {
          document.getElementById('join-error').textContent = 'Wrong room or password. Please try again.';
          document.getElementById('join-error').style.display = 'block';
          btn.innerHTML = 'Enter Class →'; btn.disabled = false;
        }
      } catch(e) {
        // Server waking up, keep spinner
      }
    }

    // Allow pressing Enter to submit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') joinClass();
    });
  </script>


<!-- Rotate device overlay -->
<div id="rotate-msg" style="display:none;position:fixed;inset:0;background:#1a1a2e;z-index:99999;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;">
  <div style="font-size:4rem;margin-bottom:20px;animation:rotateIcon 2s linear infinite;">📱</div>
  <p style="font-size:1.4rem;font-weight:900;color:#a0c4ff;margin-bottom:10px;">Please rotate your device</p>
  <p style="font-size:1rem;color:#666;">This app works best in landscape mode</p>
  <style>@keyframes rotateIcon { 0%{transform:rotate(0deg)} 50%{transform:rotate(90deg)} 100%{transform:rotate(0deg)} }</style>
</div>
</body>
</html>
