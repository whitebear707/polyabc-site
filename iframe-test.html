<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>iFrame Test</title>
  <style>
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: white; padding: 20px; }
    input { width: 600px; padding: 10px; border-radius: 8px; border: none; font-size: 1rem; margin-right: 10px; }
    button { padding: 10px 20px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    #result { margin-top: 20px; padding: 12px; border-radius: 8px; font-weight: 700; display: none; }
    iframe { margin-top: 20px; width: 100%; height: 600px; border: 2px solid #1a73e8; border-radius: 8px; background: white; }
  </style>
</head>
<body>
  <h2>iFrame Embed Test</h2>
  <p style="color:#a0c4ff;">Paste an Off2Class lesson URL below and click Test</p>
  <input type="text" id="url-input" placeholder="https://app.off2class.com/lesson/..."/>
  <button onclick="testIframe()">Test</button>
  <div id="result"></div>
  <iframe id="test-frame" style="display:none;"></iframe>

  <script>
    function testIframe() {
      const url = document.getElementById('url-input').value.trim();
      if (!url) return;
      const frame = document.getElementById('test-frame');
      const result = document.getElementById('result');

      frame.style.display = 'block';
      frame.src = url;
      result.style.display = 'block';
      result.style.background = 'rgba(255,215,0,0.1)';
      result.style.border = '1px solid #ffd700';
      result.style.color = '#ffd700';
      result.textContent = '⏳ Loading... if the lesson appears below it works. If you see an error or blank, they block iFrames.';

      frame.onload = () => {
        try {
          // Try accessing frame content — will throw if blocked by CORS
          const doc = frame.contentDocument || frame.contentWindow.document;
          result.style.background = 'rgba(0,200,83,0.1)';
          result.style.border = '1px solid #00c853';
          result.style.color = '#00c853';
          result.textContent = '✅ iFrame loaded successfully! Off2Class allows embedding.';
        } catch(e) {
          // Cross-origin — still may have loaded visually
          result.style.background = 'rgba(255,215,0,0.1)';
          result.style.border = '1px solid #ffd700';
          result.style.color = '#ffd700';
          result.textContent = '🟡 iFrame loaded (cross-origin). Check if the lesson is visible below.';
        }
      };

      frame.onerror = () => {
        result.style.background = 'rgba(229,57,53,0.1)';
        result.style.border = '1px solid #e53935';
        result.style.color = '#e53935';
        result.textContent = '❌ Blocked — Off2Class does not allow iFrame embedding.';
      };
    }
  </script>
</body>
</html>
